name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build library
        run: ./gradlew :compose2pdf:build

      - name: Unit tests
        run: ./gradlew :compose2pdf:test

      - name: Fidelity tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run ./gradlew :fidelity-test:test

      - name: Fidelity tests (macOS)
        if: runner.os == 'macOS'
        run: ./gradlew :fidelity-test:test

      - name: Upload fidelity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fidelity-report-${{ matrix.os }}
          path: fidelity-test/build/reports/fidelity/
          if-no-files-found: ignore

      - name: Smoke test publishToMavenLocal
        run: ./gradlew :compose2pdf:publishToMavenLocal
