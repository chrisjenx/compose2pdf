name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        java-version: [17, 21]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Build library
        run: ./gradlew :compose2pdf:build

      - name: Unit tests
        run: ./gradlew :compose2pdf:test

      - name: iOS simulator tests (macOS)
        if: runner.os == 'macOS' && matrix.java-version == 17
        run: ./gradlew :compose2pdf:iosSimulatorArm64Test

      - name: Fidelity tests (Linux)
        if: runner.os == 'Linux' && matrix.java-version == 17
        run: xvfb-run ./gradlew :fidelity-test:test

      - name: Fidelity tests (macOS)
        if: runner.os == 'macOS' && matrix.java-version == 17
        run: ./gradlew :fidelity-test:test

      - name: Upload fidelity report
        if: always() && matrix.java-version == 17
        uses: actions/upload-artifact@v4
        with:
          name: fidelity-report-${{ matrix.os }}
          path: fidelity-test/build/reports/fidelity/
          if-no-files-found: ignore

      - name: Smoke test publishToMavenLocal
        if: matrix.os == 'macos-latest' && matrix.java-version == 17
        run: ./gradlew :compose2pdf:publishToMavenLocal
