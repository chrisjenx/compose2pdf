name: Compose Compatibility

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 9 * * 1' # Weekly Monday 9am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  load-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.load.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: load
        run: echo "matrix=$(jq -c '.versions' .github/compose-versions.json)" >> "$GITHUB_OUTPUT"

  # Publishes the ONE library artifact (built against the pinned base) to mavenLocal,
  # then runs a standalone consumer against each target Compose runtime. This tests the
  # binary we actually ship, not a per-version recompile.
  test:
    needs: load-versions
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        version: ${{ fromJson(needs.load-versions.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    name: CMP ${{ matrix.version.compose-version }} / ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v5

      - name: Publish library to Maven Local (built against pinned base)
        run: ./gradlew :compose2pdf:publishToMavenLocal

      - name: Resolve published library version
        id: lib
        run: echo "version=$(grep '^version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      # The one published binary is expected to run on EVERY matrix version (the scene
      # driver resolves the CMP API by reflection). Pre-release cells (version contains '-')
      # stay non-blocking only as a guard against unrelated beta breakage, not the API boundary.
      - name: Compatibility smoke test (Linux)
        if: runner.os == 'Linux'
        continue-on-error: ${{ contains(matrix.version.compose-version, '-') }}
        run: >
          xvfb-run ./gradlew -p compat-consumer run
          -PcomposeVersion=${{ matrix.version.compose-version }}
          -PkotlinVersion=${{ matrix.version.kotlin-version }}
          -Pcompose2pdfVersion=${{ steps.lib.outputs.version }}

      - name: Compatibility smoke test (macOS)
        if: runner.os == 'macOS'
        continue-on-error: ${{ contains(matrix.version.compose-version, '-') }}
        run: >
          ./gradlew -p compat-consumer run
          -PcomposeVersion=${{ matrix.version.compose-version }}
          -PkotlinVersion=${{ matrix.version.kotlin-version }}
          -Pcompose2pdfVersion=${{ steps.lib.outputs.version }}

  # Blocking guard for the reflective NextDriver (CMP >=1.12 reshaped scene API).
  # The rolling newest-prerelease cell in `test` is continue-on-error (it tolerates upstream
  # prerelease churn), which leaves the >=1.12 reflective dispatch with no BLOCKING check.
  # This job pins a FROZEN, already-verified reshaped release (1.12.0-beta01 - an immutable
  # artifact that can't churn) and fails CI if our NextDriver reflection regresses. The weekly
  # version-bump can't touch this pin (it's hardcoded here, not in compose-versions.json).
  # Remove this job once a STABLE 1.12.x enters the matrix (its cell is blocking and covers this).
  nextdriver-guard:
    name: Reflective NextDriver guard (CMP 1.12.0-beta01)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v5

      - name: Pin the frozen reshaped CMP (>=1.12)
        run: |
          set -euo pipefail
          perl -i -pe '
            s/^kotlin = ".*"/kotlin = "2.4.0"/;
            s/^compose-multiplatform = ".*"/compose-multiplatform = "1.12.0-beta01"/;
          ' gradle/libs.versions.toml
          grep -qE '^kotlin = "2.4.0"$' gradle/libs.versions.toml
          grep -qE '^compose-multiplatform = "1.12.0-beta01"$' gradle/libs.versions.toml
          grep -E '^(kotlin|compose-multiplatform) = ' gradle/libs.versions.toml

      - name: Unit tests on the reshaped scene API (exercises NextDriver)
        # Recompiling here runs the SAME reflective ComposeSceneRenderer that ships (dispatch is
        # runtime-based on the CMP present). With CMP 1.12.0-beta01 on the classpath FrameRecomposer
        # exists, so NextDriver is selected and the render tests drive the reflective >=1.12 path.
        # LegacyDriver cannot drive the reshaped API, so a green run proves NextDriver works; a
        # broken path fails this BLOCKING job (no continue-on-error).
        run: ./gradlew :compose2pdf:test --no-configuration-cache

  # Single required status check for branch protection. Fails if any required job did not
  # succeed, so the non-blocking prerelease matrix cell can never mask a real failure.
  compat-gate:
    name: Compose Compatibility CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - load-versions
      - test
      - nextdriver-guard
    steps:
      - name: Verify all required jobs succeeded
        run: |
          echo "  load-versions:    ${{ needs.load-versions.result }}"
          echo "  test:             ${{ needs.test.result }}"
          echo "  nextdriver-guard: ${{ needs.nextdriver-guard.result }}"
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] \
             || [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]] \
             || [[ "${{ contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "::error::One or more required jobs did not succeed."
            exit 1
          fi
          echo "All required jobs succeeded."
