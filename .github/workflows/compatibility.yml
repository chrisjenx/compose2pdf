name: Compose Compatibility

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 9 * * 1' # Weekly Monday 9am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  load-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.load.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: load
        run: echo "matrix=$(jq -c '.versions' .github/compose-versions.json)" >> "$GITHUB_OUTPUT"

  test:
    needs: load-versions
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        version: ${{ fromJson(needs.load-versions.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    name: CMP ${{ matrix.version.compose-version }} / ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v5

      # Compose Multiplatform 1.11+ ships Skiko built against a newer iOS SDK
      # (auto-links the UIUtilities framework), so linking the iOS test binary
      # needs a newer Xcode than the runner's default. Select the latest Xcode
      # installed on the image (the macOS runners ship several).
      - name: Select latest Xcode (macOS)
        if: runner.os == 'macOS'
        run: |
          XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n1)
          echo "Selecting $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Override versions
        run: |
          perl -i -pe "s/^kotlin = .*/kotlin = \"${{ matrix.version.kotlin-version }}\"/" gradle/libs.versions.toml
          perl -i -pe "s/^compose-multiplatform = .*/compose-multiplatform = \"${{ matrix.version.compose-version }}\"/" gradle/libs.versions.toml
          echo "Testing CMP ${{ matrix.version.compose-version }} + Kotlin ${{ matrix.version.kotlin-version }}"

      - name: Build and test
        run: ./gradlew :compose2pdf:build
